<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Tamagotchi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="gameboy">

    <div class="screen-frame">

        <canvas id="gameCanvas" width="420" height="320"></canvas>

    </div>

    <div class="controls">

        <button id="feedBtn">🍗 Feed</button>
        <button id="cakeBtn">🍰 Cake</button>
        <button id="iceBtn">🍦 IceCream</button>

    </div>

    <div class="stats">

        <div class="stat">
            Hunger
            <div class="bar">
                <div id="hungerBar" class="fill"></div>
            </div>
        </div>

        <div class="stat">
            Happiness
            <div class="bar">
                <div id="happyBar" class="fill"></div>
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
